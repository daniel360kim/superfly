algo:
  name: sha2c
  network: ${network}
  l_rollout: 32
  actor_lr: 0.001
  critic_lr: 0.003
  gamma: 0.99
  lmbda: 0.95
  entropy_weight: 0.01
  actor_grad_norm: 1.0
  critic_grad_norm: 10.0
  n_minibatch: 8
  target_update_rate: 1.0
  critic_network:
    name: mlp
    hidden_dim:
    - 256
    - 128
env:
  render:
    name: obstacle_avoidance_renderer
    headless: ${headless}
    n_envs: ${env.n_envs}
    n_agents: ${n_agents}
    dt: ${env.dt}
    render_n_envs: 16
    env_spacing: ${env.length.max}
    physics_engine: physx
    ground_plane: ${env.ground_plane}
    record_video: ${record_video}
    sphere_n_segments: 12
    video_camera:
      width: 512
      height: 288
      fov: 60.0
      far_plane: 20
    viewer:
      ref_env: 0
      pos:
      - -5
      - -5
      - 4
      lookat:
      - 0
      - 0
      - 0
    camera: ${env.sensor}
  randomizer:
    name: default_randomizer
    enabled: true
  imu:
    name: default_imu
    enable_drift: true
    enable_noise: true
    imu_mounting_error_range_deg: 2.0
    acc_drift_std: 0.13564659966250536
    acc_noise_std: 0.15690639999999997
    gyro_drift_std: 0.0014352700094407325
    gyro_noise_std: 0.02443460952792061
  obstacles:
    name: outdoor
    walls: false
    ceiling: false
    n_obstacles: ${env.n_obstacles}
    height_scale: ${env.height_scale}
    sphere_percentage: 0.33
    sphere_radius_range:
    - 0.6
    - 2.0
    - 0.4
    cube_lw_range:
    - 0.6
    - 1.4
    - 0.2
    cube_h_range:
    - 10.0
    - 15.0
    - 1.0
    randomize_cube_pose: true
    cube_roll_pitch_range: 15.0
    randpos_std_min: 6
    randpos_std_max: 7
    safety_range: 1.7
  name: obstacle_avoidance
  abbr: oa
  sensor: ${sensor}
  dynamics: ${dynamics}
  dt: 0.0333
  length:
    default: 25
    enabled: false
    min: 25
    max: 25
  height_scale: 0.25
  n_envs: ${n_envs}
  n_agents: ${n_agents}
  obs_frame: local
  max_time: 30
  wait_before_truncate: 5.0
  max_target_vel: 6.0
  min_target_vel: 3.0
  last_action_in_obs: false
  r_drone: 0.2
  n_obstacles: 30
  ground_plane: true
  loss_weights:
    pointmass:
      vel: 2
      z: 1.0
      oa: 5.0
      jerk: 0.01
      pos: 5.0
      collision: 0.0
    quadrotor:
      vel: 1.0
      oa: 1.0
      jerk: 1.0
      pos: 5.0
      collision: 0.0
  reward_weights:
    constant: 2
    pointmass:
      vel: 0.0
      z: 0.0
      oa: 0.0
      jerk: 0.001
      pos: 0.0
      arrive: 1.0
      collision: 50.0
    quadrotor:
      vel: 1.0
      oa: 1.0
      jerk: 1.0
      pos: 5.0
      collision: 50.0
  enable_grid: false
dynamics:
  name: countinuous_pointmass
  abbr: pmc
  n_envs: ${n_envs}
  n_agents: ${n_agents}
  dt: ${env.dt}
  action_frame: local
  m: 1.0
  g: 9.81
  D:
    default: 0.375
    enabled: true
    min: 0.3
    max: 0.45
  lmbda:
    default: 2.6
    enabled: true
    min: 2.5
    max: 2.7
  alpha: 1.0
  align_yaw_with_target_direction: false
  align_yaw_with_vel_ema: true
  vel_ema_factor:
    default: 0.1
    enabled: true
    min: 0.08
    max: 0.12
  max_acc:
    xy:
      default: 20
      enabled: true
      min: 10
      max: 20
    z:
      default: 40
      enabled: true
      min: 25
      max: 40
  solver_type: rk4
  n_substeps: 1
network:
  name: mlp
  hidden_dim:
  - 256
  - 128
sensor:
  name: camera
  width: 16
  height: 9
  horizontal_fov: 86.0
  max_dist: 5.0
  onboard_position:
  - 0.2
  - 0.0
  - 0.05
  onboard_attitude:
  - 0.0
  - 0.0
  - 0.0
  - 1.0
  n_envs: ${n_envs}
  n_agents: ${n_agents}
  pitch_angle_deg:
    default: 0
    enabled: true
    min: -5
    max: 5
  yaw_angle_deg:
    default: 0
    enabled: true
    min: -3
    max: 3
  roll_angle_deg:
    default: 0
    enabled: true
    min: -3
    max: 3
logger:
  name: tensorboard
l_rollout: ${algo.l_rollout}
n_agents: 1
n_envs: 1024
n_updates: 1000
log_freq: 10
log_level: info
save_freq: 100
device: 0
n_jobs: 1
headless: true
display_image: false
record_video: false
runname: ''
checkpoint: null
export:
  obs_frame: ${env.obs_frame}
  action_frame: ${dynamics.action_frame}
  jit: true
  onnx: true
torch_profile: false
seed: 0
torch_deterministic: false
ref_path: null
